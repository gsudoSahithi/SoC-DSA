name: Handle Submission

on:
  pull_request:
    types: [closed]

jobs:
  move-submission:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate and extract roll number from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

          # Validate roll number format: e.g. 23b0001
          if [[ ! "$BRANCH" =~ ^[0-9]{2}b[0-9]+$ ]]; then
            echo "invalid=true" >> $GITHUB_OUTPUT
            echo "Branch '$BRANCH' does not match roll number format (e.g. 23b0001). Skipping."
            exit 0
          fi

          echo "invalid=false" >> $GITHUB_OUTPUT
          echo "roll=$BRANCH" >> $GITHUB_OUTPUT

      - name: Get list of files changed in this PR
        if: steps.extract.outputs.invalid != 'true'
        id: pr_files
        uses: actions/github-script@v7
        with:
          script: |
            // Fetch all files changed in this PR via the GitHub API
            // This is reliable regardless of merge strategy (squash, rebase, merge commit)
            const pr_number = ${{ github.event.pull_request.number }};
            let files = [];
            let page = 1;

            while (true) {
              const { data } = await github.rest.pulls.listFiles({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr_number,
                per_page: 100,
                page: page
              });
              files = files.concat(data);
              if (data.length < 100) break;
              page++;
            }

            // Filter to only files added/modified inside Week */ folders
            const weekFiles = files
              .filter(f => (f.status === 'added' || f.status === 'modified'))
              .map(f => f.filename)
              .filter(f => /^Week \d+\//.test(f));

            console.log("Week files found:", weekFiles);

            // Write to a temp file to pass to the next step (avoids output length limits)
            const fs = require('fs');
            fs.writeFileSync('/tmp/week_files.txt', weekFiles.join('\n'));

            core.setOutput('count', weekFiles.length);

      - name: Move submitted files to submissions folder
        if: steps.extract.outputs.invalid != 'true' && steps.pr_files.outputs.count > 0
        id: move
        run: |
          ROLL="${{ steps.extract.outputs.roll }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          MOVED_FILES=""

          # Read the file list written by the previous step
          FILES=$(cat /tmp/week_files.txt)

          if [ -z "$FILES" ]; then
            echo "No week files found in this PR."
            echo "moved=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Files to process:"
          echo "$FILES"

          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue

            WEEK=$(echo "$FILE" | sed 's|/.*||')     # e.g. "Week 1"
            FILENAME=$(basename "$FILE")

            DEST="submissions/$ROLL/$WEEK/$FILENAME"
            mkdir -p "submissions/$ROLL/$WEEK"

            # Copy the file into submissions/
            cp "$FILE" "$DEST"
            echo "Copied: $FILE -> $DEST"

            # Remove the file from the Week folder (restore original or delete if new)
            if git cat-file -e "HEAD:$FILE" 2>/dev/null; then
              # File existed before this PR — check if it existed before the merge commit
              MERGE_BASE=$(git merge-base HEAD~1 HEAD || echo "")
              if [ -n "$MERGE_BASE" ] && git cat-file -e "$MERGE_BASE:$FILE" 2>/dev/null; then
                git checkout "$MERGE_BASE" -- "$FILE"
                echo "Restored: $FILE to pre-PR state"
              else
                git rm -f "$FILE"
                echo "Removed: $FILE (was new in this PR)"
              fi
            else
              git rm -f "$FILE" 2>/dev/null || rm -f "$FILE"
              echo "Removed: $FILE"
            fi

            MOVED_FILES="${MOVED_FILES}\n- \`$DEST\`"
          done <<< "$FILES"

          # Commit and push
          git add submissions/
          git add -u

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git commit -m "submission: $ROLL (PR #$PR_NUMBER)" || echo "Nothing to commit"
          git push

          # Save moved files list for the comment step
          printf "%b" "$MOVED_FILES" > /tmp/moved_files.txt
          echo "moved=true" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: steps.extract.outputs.invalid != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const roll = `${{ steps.extract.outputs.roll }}`;
            const hasMoved = `${{ steps.move.outputs.moved }}` === 'true';
            const count = parseInt(`${{ steps.pr_files.outputs.count }}` || '0');

            let body;

            if (count === 0 || !hasMoved) {
              body = `👋 Hi @${{ github.event.pull_request.user.login }}! Your PR was merged, but no files were found inside \`Week */\` folders — nothing was moved to submissions.\n\nIf this is unexpected, make sure your files are placed inside folders named exactly \`Week 1\`, \`Week 2\`, etc.`;
            } else {
              let movedList = '';
              try {
                movedList = fs.readFileSync('/tmp/moved_files.txt', 'utf8').trim();
              } catch(e) {
                movedList = '_(file list unavailable)_';
              }
              body = `✅ Submission received for **${roll}**!\n\nThe following files have been moved to your submissions folder:\n${movedList}\n\nThanks for submitting!`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ github.event.pull_request.number }},
              body: body
            });
